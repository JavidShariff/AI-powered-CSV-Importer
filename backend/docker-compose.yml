version: "3.9"
services:
  api:
    build: .
    ports:
      - "8787:8787"
    environment:
      - NODE_ENV=production
      - PORT=8787
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    restart: unless-stopped
